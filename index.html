  <section class="container mb-5">

    <div class="row g-4">
      
      <div class="col-md-4">

        <div class="card shadow-sm h-100 border-0">

            <h5 class="card-title">
              Ranma
            </h5>
            <p class="card-text">
                ...............................................
            </p>
            <button class="btn btn-outline-primary">
              Leer más
            </button>
          </div>
        </div>
      </div>


      <div class="col-md-4">

        <div class="card shadow-sm h-100 border-0">
          <img
            src="https://static.wikia.nocookie.net/ranma/images/f/f3/ShampooAnime2024.png/revision/latest?cb=20240824173124&path-prefix=es"
            class="card-img-top"
            alt="Imagen"
          >
          <div class="card-body">
            <h5 class="card-title">
              Shampoo
            </h5>
            <p class="card-text">
                ...............................................
            </p>
            <button class="btn btn-success">
              Ver más
            </button>
          </div>
        </div>
      </div>

<div class="col-md-4">

        <div class="card shadow-sm h-100 border-0">

          <img
            src="https://static.wikia.nocookie.net/ranma/images/0/00/AkaneAnime2024.png/revision/latest?cb=20241103104534&path-prefix=es"
            class="card-img-top"
            alt="Imagen"
          >
          <div class="card-body">
            <h5 class="card-title">
              Akane
            </h5>
            <p class="card-text">
             ...............................................
            </p>
            <button class="btn btn-danger">
              Detalles
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
     
<section class="container mb-5">

    <div class="card shadow border-0">

      <div class="card-body p-4">

        <h2 class="text-center mb-4">
          Contact
        </h2>
        <form>
          <div class="mb-3">
            <label class="form-label">
              Nombre
            </label>
            <input
              type="text"
              class="form-control"
              placeholder="Ingrese su nombre"
            >

          </div>

          <div class="mb-3">
            <label class="form-label">
              Email
            </label>
            <input
              type="email"
              class="form-control"
              placeholder="Ingrese su correo"
            >
          </div>


          <div class="mb-3">
            <label class="form-label">
              Mensaje
            </label>
            <textarea
              class="form-control"
              rows="4"
              placeholder="Escriba un mensaje"
            ></textarea>

          </div>


          <div class="text-center">

            <button class="btn btn-dark px-4">
              Enviar mensaje
            </button>
          </div>
        </form>
      </div>
    </div>



  </section>
  </html>
